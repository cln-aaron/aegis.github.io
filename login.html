<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in · AEGIS·AI</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none' stroke='%235af2c4' stroke-width='2' stroke-linejoin='round' stroke-linecap='round'%3E%3Cpath d='M16 2.6 27 6.9V14.8C27 21.8 22.4 26.9 16 29.4 9.6 26.9 5 21.8 5 14.8V6.9Z'/%3E%3Cpath d='M10.8 15.4 16 10.6l5.2 4.8'/%3E%3Cpath d='M10.8 19.8 16 15l5.2 4.8'/%3E%3Ccircle cx='16' cy='22.8' r='1.4' fill='%235af2c4' stroke='none'/%3E%3C/svg%3E" />
<script>try{var th=localStorage.getItem("aegis_theme");if(th)document.documentElement.dataset.theme=th;}catch(e){}</script>
<style>
:root{--bg:#06070a;--panel:#0d1018;--line:rgba(255,255,255,.1);--line-2:rgba(255,255,255,.18);--txt:#e8ecf2;--muted:#8b94a6;--faint:#5b6479;--accent:#5af2c4;--danger:#ff5d6c;--mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Space Grotesk',-apple-system,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr}
a{color:inherit}
.aside{position:relative;padding:54px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--line);overflow:hidden}
.aside::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:48px 48px;-webkit-mask-image:radial-gradient(ellipse 70% 60% at 30% 30%,#000,transparent 70%);mask-image:radial-gradient(ellipse 70% 60% at 30% 30%,#000,transparent 70%)}
.aside::after{content:"";position:absolute;left:-10%;top:20%;width:560px;height:560px;background:radial-gradient(circle,rgba(90,242,196,.12),transparent 60%);filter:blur(8px)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;position:relative;z-index:1}
.brand svg{color:var(--accent)}
.aside h1{position:relative;z-index:1;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:600;line-height:1.15;letter-spacing:-.02em;max-width:460px}
.aside h1 em{font-style:normal;color:var(--accent)}
.aside .sub{position:relative;z-index:1;color:var(--muted);margin-top:18px;max-width:420px;font-size:1.02rem}
.feed{position:relative;z-index:1;font-family:var(--mono);font-size:12px;color:var(--faint);line-height:2.1}
.feed b{color:var(--accent)}.feed .w{color:#ffb454}
.panel{display:flex;align-items:center;justify-content:center;padding:40px}
.card{width:100%;max-width:380px}
.card h2{font-size:1.7rem;font-weight:600;letter-spacing:-.01em}
.card .lead{color:var(--muted);margin:10px 0 32px;font-size:.97rem}
label{display:block;font-family:var(--mono);font-size:12px;color:var(--muted);margin:18px 0 8px;letter-spacing:.4px}
input{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-family:var(--sans);font-size:15px;padding:13px 14px;border-radius:3px;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:13px;color:var(--muted)}
.row a{color:var(--accent);text-decoration:none;font-family:var(--mono);font-size:12px}
button{width:100%;margin-top:26px;background:var(--accent);color:#04130d;border:0;font-family:var(--mono);font-weight:600;font-size:14px;padding:14px;border-radius:3px;cursor:pointer;transition:box-shadow .2s,transform .2s}
button:hover{box-shadow:0 0 28px rgba(90,242,196,.25);transform:translateY(-1px)}
.demo{margin-top:22px;border:1px dashed var(--line-2);border-radius:4px;padding:14px 16px;font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.8}
.demo b{color:var(--accent)}
.demo button{width:auto;margin:10px 0 0;background:transparent;border:1px solid var(--line-2);color:var(--txt);padding:8px 14px;font-weight:500}
.demo button:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;transform:none}
.err{color:var(--danger);font-family:var(--mono);font-size:12px;margin-top:14px;min-height:16px}
.back{position:relative;z-index:1;font-family:var(--mono);font-size:12px;color:var(--muted);text-decoration:none}
.back:hover{color:var(--accent)}
@media(max-width:860px){body{grid-template-columns:1fr}.aside{display:none}}
</style>
</head>
<body>
  <aside class="aside">
    <div class="brand">
      <svg viewBox="0 0 32 32" width="23" height="23" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M16 2.6 27 6.9V14.8C27 21.8 22.4 26.9 16 29.4 9.6 26.9 5 21.8 5 14.8V6.9Z"/><path d="M10.8 15.4 16 10.6l5.2 4.8"/><path d="M10.8 19.8 16 15l5.2 4.8"/><circle cx="16" cy="22.8" r="1.4" fill="currentColor" stroke="none"/></svg>
      AEGIS·AI
    </div>
    <div>
      <h1>Security operations for the AI you <em>can't see yet</em>.</h1>
      <p class="sub">Sign in to the live operations console — discovery, identity, correlation, and continuous red team in one place.</p>
    </div>
    <div class="feed" id="feed"></div>
  </aside>

  <main class="panel">
    <form class="card" id="form" autocomplete="off">
      <h2>Sign in</h2>
      <p class="lead">Welcome back. Use your work account to reach the console.</p>

      <label for="email">Work email</label>
      <input id="email" type="email" placeholder="you@company.com" />

      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="••••••••••" />

      <div class="row">
        <label style="display:flex;align-items:center;gap:8px;margin:0;color:var(--muted);text-transform:none;letter-spacing:0;font-family:var(--sans);font-size:13px"><input type="checkbox" style="width:auto" /> Keep me signed in</label>
      </div>

      <button type="submit">Sign in to console</button>
      <div class="err" id="err"></div>

      <p style="margin-top:24px"><a class="back" href="index.html">← Back to site</a></p>
    </form>
  </main>

<script>
(function(){
  var feed=document.getElementById("feed");
  var lines=['discovery · <b>1,284</b> assets indexed','identity · scoped token issued to svc-rag-07','redteam · run rt-0517 — <b>206</b> attacks','correlation · incident #4471 <span class="w">contained</span>','provenance · model re-scan clean','telemetry · <b>2.1M</b> events / 24h'];
  var i=0;function add(){var d=document.createElement("div");d.innerHTML="› "+lines[i%lines.length];feed.appendChild(d);if(feed.children.length>6)feed.removeChild(feed.firstChild);i++;}
  add();add();add();add();
  if(!window.matchMedia("(prefers-reduced-motion: reduce)").matches)setInterval(add,2200);

  var GATE="23fcc79206daaf7d7ac2270d93c924eb75121bcf8cf4b48125bd8f4cf1b09a2b";
  var SALT="aegis-portal::v1";
  function sha256Hex(str){
    var enc=new TextEncoder().encode(str);
    return crypto.subtle.digest("SHA-256",enc).then(function(buf){
      return Array.prototype.map.call(new Uint8Array(buf),function(b){return ("0"+b.toString(16)).slice(-2);}).join("");
    });
  }
  function fail(){document.getElementById("err").textContent="Invalid credentials. Check your email and password and try again.";}
  document.getElementById("form").addEventListener("submit",function(e){
    e.preventDefault();
    var em=document.getElementById("email").value.trim().toLowerCase();
    var pw=document.getElementById("pass").value;
    if(!em||!pw){document.getElementById("err").textContent="Enter your work email and password.";return;}
    if(!window.crypto||!crypto.subtle){fail();return;}
    sha256Hex(SALT+"|"+em+"|"+pw).then(function(h){
      if(h===GATE){try{sessionStorage.setItem("aegis_auth","1");}catch(e){}window.location.href="dashboard.html";}
      else fail();
    }).catch(fail);
  });
})();
</script>
</body>
</html>
